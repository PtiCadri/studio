services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: studio
      POSTGRES_PASSWORD: studio
      POSTGRES_DB: studio
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio -d studio"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    ports:
      - "8080:8080"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
    # Windows/Docker: make file watching reliable
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "500"
      CHOKIDAR_USEPOLLING: "true"
volumes:
  db_data:
  web_node_modules:
